name: cf-sync

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish @saptools/cf-sync to npm
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main
    tags:
      - "cf-sync-v*"
    paths:
      - ".github/workflows/cf-sync.yml"
      - "packages/cf-sync/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "tsconfig.base.json"
      - "eslint.config.js"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/cf-sync.yml"
      - "packages/cf-sync/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "tsconfig.base.json"
      - "eslint.config.js"

permissions:
  contents: read

concurrency:
  group: cf-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build and verify cf-sync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @saptools/cf-sync lint

      - name: Typecheck
        run: pnpm --filter @saptools/cf-sync typecheck

      - name: Build
        run: pnpm --filter @saptools/cf-sync build

      - name: Run unit tests
        run: pnpm --filter @saptools/cf-sync test:unit

      # E2E is intentionally excluded here because it uses live SAP CF credentials.
      - name: Verify publish tarball
        run: npm pack --dry-run
        working-directory: packages/cf-sync

  publish:
    name: Publish cf-sync to npm
    runs-on: ubuntu-latest
    needs: ci
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.publish == true && github.ref == 'refs/heads/main') ||
      startsWith(github.ref, 'refs/tags/cf-sync-v')
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @saptools/cf-sync build

      - name: Publish
        run: npm publish --provenance --access public
        working-directory: packages/cf-sync

name: cf-ops

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish @saptools/cf-ops to npm
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main
    paths:
      - ".github/workflows/cf-ops.yml"
      - "packages/cf-ops/package.json"
      - "packages/cf-ops/README.md"
      - "packages/cf-ops/src/**"
      - "packages/cf-ops/tests/**"
      - "packages/cf-ops/eslint.config.js"
      - "packages/cf-ops/playwright.config.ts"
      - "packages/cf-ops/tsconfig.json"
      - "packages/cf-ops/tsup.config.ts"
      - "packages/cf-ops/vitest.config.ts"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/cf-ops.yml"
      - "packages/cf-ops/package.json"
      - "packages/cf-ops/README.md"
      - "packages/cf-ops/src/**"
      - "packages/cf-ops/tests/**"
      - "packages/cf-ops/eslint.config.js"
      - "packages/cf-ops/playwright.config.ts"
      - "packages/cf-ops/tsconfig.json"
      - "packages/cf-ops/tsup.config.ts"
      - "packages/cf-ops/vitest.config.ts"

permissions:
  contents: read

concurrency:
  group: cf-ops-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build and verify cf-ops
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Spell check
        run: pnpm --filter @saptools/cf-ops cspell

      - name: Lint
        run: pnpm --filter @saptools/cf-ops lint

      - name: Typecheck
        run: pnpm --filter @saptools/cf-ops typecheck

      - name: Build
        run: pnpm --filter @saptools/cf-ops build

      - name: Run unit tests
        run: pnpm --filter @saptools/cf-ops test:unit

      - name: Run fake-backed e2e tests
        run: pnpm --filter @saptools/cf-ops test:e2e:fake

      - name: Verify publish tarball
        run: npm pack --dry-run
        working-directory: packages/cf-ops

  publish:
    name: Publish cf-ops to npm
    runs-on: ubuntu-latest
    needs: ci
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.publish == true && github.ref == 'refs/heads/main')
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @saptools/cf-ops build

      - name: Check whether version is already published
        id: publish_check
        working-directory: packages/cf-ops
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"

          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version ${package_version} is already published. Skipping npm publish."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.publish_check.outputs.should_publish == 'true'
        run: npm publish --provenance --access public
        working-directory: packages/cf-ops

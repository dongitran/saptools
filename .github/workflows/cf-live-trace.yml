name: cf-live-trace
# cspell:words pipefail endgroup

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish @saptools/cf-live-trace to npm
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main
    paths:
      - "pnpm-lock.yaml"
      - ".github/workflows/cf-live-trace.yml"
      - "packages/cf-live-trace/package.json"
      - "packages/cf-live-trace/README.md"
      - "packages/cf-live-trace/LICENSE"
      - "packages/cf-live-trace/src/**"
      - "packages/cf-live-trace/tests/**"
      - "packages/cf-live-trace/eslint.config.js"
      - "packages/cf-live-trace/playwright.config.ts"
      - "packages/cf-live-trace/tsconfig.json"
      - "packages/cf-live-trace/tsup.config.ts"
      - "packages/cf-live-trace/vitest.config.ts"
  pull_request:
    branches:
      - main
    paths:
      - "pnpm-lock.yaml"
      - ".github/workflows/cf-live-trace.yml"
      - "packages/cf-live-trace/package.json"
      - "packages/cf-live-trace/README.md"
      - "packages/cf-live-trace/LICENSE"
      - "packages/cf-live-trace/src/**"
      - "packages/cf-live-trace/tests/**"
      - "packages/cf-live-trace/eslint.config.js"
      - "packages/cf-live-trace/playwright.config.ts"
      - "packages/cf-live-trace/tsconfig.json"
      - "packages/cf-live-trace/tsup.config.ts"
      - "packages/cf-live-trace/vitest.config.ts"

permissions:
  contents: read

concurrency:
  group: cf-live-trace-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build and verify cf-live-trace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace deps and cf-live-trace
        run: pnpm --filter @saptools/cf-live-trace... build

      - name: Spell check
        run: pnpm --filter @saptools/cf-live-trace cspell

      - name: Lint
        run: pnpm --filter @saptools/cf-live-trace lint

      - name: Typecheck
        run: pnpm --filter @saptools/cf-live-trace typecheck

      - name: Run unit tests
        run: pnpm --filter @saptools/cf-live-trace test:unit

      - name: Run e2e tests
        run: pnpm --filter @saptools/cf-live-trace test:e2e

      - name: Verify publish tarball
        run: pnpm pack
        working-directory: packages/cf-live-trace

  publish:
    name: Publish cf-live-trace to npm
    runs-on: ubuntu-latest
    needs: ci
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.publish == true && github.ref == 'refs/heads/main')
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace deps and cf-live-trace
        run: pnpm --filter @saptools/cf-live-trace... build

      - name: Check whether version is already published
        id: publish_check
        working-directory: packages/cf-live-trace
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"

          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version ${package_version} is already published. Skipping npm publish."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for @saptools/* deps to appear on npm
        if: steps.publish_check.outputs.should_publish == 'true'
        working-directory: packages/cf-live-trace
        run: |
          set -euo pipefail
          deps=$(node -e "
            const fs = require('node:fs');
            const path = require('node:path');
            const root = path.resolve(process.cwd(), '../..');
            const packageJson = require('./package.json');
            const packagesDir = path.join(root, 'packages');
            const workspacePackages = new Map();
            for (const dir of fs.readdirSync(packagesDir)) {
              const packagePath = path.join(packagesDir, dir, 'package.json');
              if (!fs.existsSync(packagePath)) continue;
              const pkg = JSON.parse(fs.readFileSync(packagePath, 'utf8'));
              workspacePackages.set(pkg.name, pkg.version);
            }
            for (const [name, version] of Object.entries(packageJson.dependencies || {})) {
              if (!name.startsWith('@saptools/')) continue;
              const resolved = String(version).startsWith('workspace:')
                ? workspacePackages.get(name)
                : String(version).replace(/^[\^~]/, '');
              if (!resolved) {
                throw new Error('Cannot resolve workspace dependency ' + name);
              }
              process.stdout.write(name + '@' + resolved + '\n');
            }
          ")
          if [ -z "$deps" ]; then
            echo "No @saptools/* deps to wait for."
            exit 0
          fi
          while IFS= read -r spec; do
            [ -z "$spec" ] && continue
            echo "::group::Waiting for $spec (timeout 5m)"
            found=0
            for i in $(seq 1 60); do
              if npm view "$spec" version >/dev/null 2>&1; then
                echo "$spec is available"
                found=1
                break
              fi
              echo "Attempt $i/60: not yet, sleeping 5s..."
              sleep 5
            done
            echo "::endgroup::"
            if [ "$found" -eq 0 ]; then
              echo "::error::Timed out waiting for $spec after 5 minutes"
              exit 1
            fi
          done <<< "$deps"

      - name: Publish
        if: steps.publish_check.outputs.should_publish == 'true'
        run: pnpm publish --provenance --access public --no-git-checks
        working-directory: packages/cf-live-trace

name: sqltools e2e

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/sqltools-e2e.yml"
      - "packages/sqltools/package.json"
      - "packages/sqltools/src/**"
      - "packages/sqltools/tests/**"
      - "packages/sqltools/playwright.config.ts"
      - "packages/sqltools/tsconfig.json"
      - "packages/sqltools/tsup.config.ts"
      - "packages/sqltools/vitest.config.ts"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/sqltools-e2e.yml"
      - "packages/sqltools/package.json"
      - "packages/sqltools/src/**"
      - "packages/sqltools/tests/**"
      - "packages/sqltools/playwright.config.ts"
      - "packages/sqltools/tsconfig.json"
      - "packages/sqltools/tsup.config.ts"
      - "packages/sqltools/vitest.config.ts"

permissions:
  contents: read

concurrency:
  group: sqltools-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Run sqltools live E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    env:
      SAP_EMAIL: ${{ secrets.SAP_EMAIL }}
      SAP_PASSWORD: ${{ secrets.SAP_PASSWORD }}
      E2E_TARGET: ${{ vars.SQLTOOLS_E2E_TARGET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate required secrets
        run: |
          if [ -z "$SAP_EMAIL" ] || [ -z "$SAP_PASSWORD" ]; then
            echo "::error::Missing SAP_EMAIL or SAP_PASSWORD repository secret."
            exit 1
          fi

      - name: Install Cloud Foundry CLI v8
        run: |
          wget -q -O - https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key | sudo gpg --dearmor -o /usr/share/keyrings/cli.cloudfoundry.org.gpg
          echo "deb [signed-by=/usr/share/keyrings/cli.cloudfoundry.org.gpg] https://packages.cloudfoundry.org/debian stable main" | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
          sudo apt-get update
          sudo apt-get install -y cf8-cli
          cf version

      - name: Build workspace deps and sqltools
        run: pnpm --filter @saptools/sqltools... build

      - name: Prime ~/.saptools/cf-structure.json via cf-sync
        run: |
          pnpm --filter @saptools/cf-sync exec node dist/cli.js sync

      - name: Run sqltools live E2E
        run: pnpm --filter @saptools/sqltools test:e2e:live

name: cf-function-trace
# cspell:words endgroup mktemp pipefail

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "tsconfig.base.json"
      - "eslint.config.*"
      - ".cspell.json"
      - "cspell*.json"
      - ".github/workflows/cf-function-trace.yml"
      - "packages/cf-function-trace/**"
      - "packages/cf-debugger/**"
      - "packages/cf-inspector/**"
  pull_request:
    branches:
      - main
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "tsconfig.base.json"
      - "eslint.config.*"
      - ".cspell.json"
      - "cspell*.json"
      - ".github/workflows/cf-function-trace.yml"
      - "packages/cf-function-trace/**"
      - "packages/cf-debugger/**"
      - "packages/cf-inspector/**"

permissions:
  contents: read

concurrency:
  group: cf-function-trace-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Build and verify cf-function-trace
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace deps and cf-function-trace
        run: pnpm --filter @saptools/cf-function-trace... build

      - name: Spell check
        run: pnpm --filter @saptools/cf-function-trace cspell

      - name: Lint
        run: pnpm --filter @saptools/cf-function-trace lint

      - name: Typecheck
        run: pnpm --filter @saptools/cf-function-trace typecheck

      - name: Run unit tests with coverage
        run: pnpm --filter @saptools/cf-function-trace test:unit

      - name: Verify changed runtime dependencies
        run: |
          pnpm --filter @saptools/cf-debugger lint
          pnpm --filter @saptools/cf-debugger typecheck
          pnpm --filter @saptools/cf-debugger test:unit
          pnpm --filter @saptools/cf-inspector lint
          pnpm --filter @saptools/cf-inspector typecheck
          pnpm --filter @saptools/cf-inspector test:unit

      # Installing only the publish candidate forces its dependencies to resolve from npm.
      - name: Pack publish candidate
        shell: bash
        run: |
          set -euo pipefail
          pack_dir="${RUNNER_TEMP}/cf-function-trace-pack"
          mkdir -p "${pack_dir}"
          pnpm --dir packages/cf-function-trace pack --pack-destination "${pack_dir}"

      - name: Smoke test publish candidate with registry dependencies
        shell: bash
        run: |
          set -euo pipefail
          pack_dir="${RUNNER_TEMP}/cf-function-trace-pack"
          smoke_dir="$(mktemp -d "${RUNNER_TEMP}/cf-function-trace-smoke.XXXXXX")"
          cd "${smoke_dir}"
          npm init --yes >/dev/null
          npm install --ignore-scripts "${pack_dir}"/saptools-cf-function-trace-*.tgz
          node --input-type=module --eval 'await import("@saptools/cf-function-trace")'
          ./node_modules/.bin/cf-function-trace --help >/dev/null
          expected_version="$(node -p "require('./node_modules/@saptools/cf-function-trace/package.json').version")"
          actual_version="$(./node_modules/.bin/cf-function-trace --version)"
          test "${actual_version}" = "${expected_version}"
          npm ls @saptools/cf-function-trace @saptools/cf-inspector @saptools/cf-debugger

  runtime-e2e:
    name: Runtime e2e on Node.js ${{ matrix.node }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node:
          - 20
          - 22
          - 24

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace deps and cf-function-trace
        run: pnpm --filter @saptools/cf-function-trace... build

      - name: Run local and fake-CF e2e tests
        run: pnpm --filter @saptools/cf-function-trace test:e2e

      - name: Upload Playwright failure artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: cf-function-trace-playwright-node-${{ matrix.node }}
          path: |
            packages/cf-function-trace/playwright-report/
            packages/cf-function-trace/test-results/
          if-no-files-found: ignore
          retention-days: 7

  publish:
    name: Publish cf-function-trace to npm
    runs-on: ubuntu-latest
    needs:
      - quality
      - runtime-e2e
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace deps and cf-function-trace
        run: pnpm --filter @saptools/cf-function-trace... build

      - name: Check whether version is already published
        id: publish_check
        working-directory: packages/cf-function-trace
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"

          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version ${package_version} is already published. Skipping npm publish."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.publish_check.outputs.should_publish == 'true'
        run: pnpm publish --provenance --access public --no-git-checks
        working-directory: packages/cf-function-trace

name: Close Stale Issues & PRs

on:
  schedule:
    # Run daily at 01:00 UTC
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  stale:
    name: Mark and Close Stale
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v10
        with:
          # Issues
          stale-issue-message: >
            This issue has been inactive for 30 days.
            It will be closed in 7 days if there is no further activity.
            Feel free to reopen if this is still relevant.
          close-issue-message: >
            Closed due to inactivity. Please reopen if still relevant.
          days-before-issue-stale: 30
          days-before-issue-close: 7
          stale-issue-label: stale

          # Pull Requests
          stale-pr-message: >
            This PR has been inactive for 14 days.
            It will be closed in 7 days if there is no further activity.
          close-pr-message: >
            Closed due to inactivity. Please reopen if still relevant.
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-pr-label: stale

          # Never mark issues with these labels as stale
          exempt-issue-labels: 'pinned,security,bug'
          exempt-pr-labels: 'pinned,security'
